<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千人千面发型迁移系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a2332 0%, #2c3e50 50%, #34495e 100%);
            min-height: 100vh;
            color: #2c3e50;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* ── 标题 ── */
        .title-container { text-align: center; margin: 30px 0 40px; }
        .chinese-title {
            font-size: 48px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 12px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .english-subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #555;
            letter-spacing: 1px;
        }

        /* ── 步骤指示器 ── */
        .workflow {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .step {
            flex: 1;
            min-width: 130px;
            text-align: center;
            padding: 15px 10px;
            background: #f5f5f5;
            margin: 5px;
            border-radius: 10px;
            color: #555;
            font-size: 14px;
            transition: all .3s;
        }
        .step.active { background: #667eea; color: white; }
        .step-number {
            display: inline-block;
            width: 30px; height: 30px;
            background: #bbb;
            color: white;
            border-radius: 50%;
            line-height: 30px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .step.active .step-number { background: white; color: #667eea; }

        /* ── 上传区域 ── */
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .upload-box {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all .3s;
            background: #fafafa;
        }
        .upload-box:hover { border-color: #667eea; background: #f0f0ff; }
        .upload-box.has-image { border-color: #4caf50; background: #f0fff0; }
        .upload-box h3 { color: #1a1a1a; margin-bottom: 10px; }
        .upload-box p { color: #555; font-size: 14px; }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,.1);
            cursor: zoom-in;
        }

        /* ── 参数区域 ── */
        .params-section {
            background: #f9f9f9;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .params-section h3 { color: #1a1a1a; margin-bottom: 18px; }
        .option-group { margin: 14px 0; }
        .option-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            color: #2c3e50;
            background: white;
            min-width: 220px;
        }
        input[type="range"] { width: 200px; vertical-align: middle; }
        input[type="range"] + span {
            font-weight: 700;
            font-size: 16px;
            color: #1a1a1a;
            margin-left: 8px;
        }
        .hint-text { font-size: 12px; color: #666; margin-top: 4px; }

        /* ── 按钮 ── */
        .btn {
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all .3s;
            box-shadow: 0 10px 30px rgba(255,71,87,.3);
            font-weight: 600;
            letter-spacing: 1px;
            margin: 8px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,71,87,.5); }
        .btn:active { transform: translateY(-1px); }
        .btn:disabled { background: #95a5a6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-dl {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 10px 30px rgba(46,204,113,.3);
        }
        .btn-dl:hover { box-shadow: 0 15px 40px rgba(46,204,113,.5); }

        .controls { text-align: center; margin: 24px 0; }

        /* ── 消息 ── */
        .message {
            padding: 14px 18px;
            border-radius: 10px;
            margin: 14px 0;
            display: none;
            font-size: 14px;
        }
        .message.show { display: block; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* ── 加载遮罩 ── */
        .loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loading.show { display: flex !important; }
        .spinner {
            border: 4px solid rgba(255,255,255,.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingText { color: white; font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        .progress-bar { width: 300px; height: 20px; background: rgba(255,255,255,.2); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width .3s; }
        #progressText { color: rgba(255,255,255,.8); font-size: 14px; margin-top: 8px; }

        /* ── 结果区域 ── */
        .result-section {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: #f0fff4;
            border-radius: 15px;
        }
        .result-section.show { display: block; }
        .result-section h2 { color: #1a1a1a; margin-bottom: 20px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .result-item { text-align: center; }
        .result-item p { color: #2c3e50; font-size: 14px; margin: 8px 0; font-weight: 600; }
        .result-item img { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,.15); cursor: zoom-in; }

        /* ── 图片放大模态框 ── */
        .image-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(0,0,0,.92);
            cursor: zoom-out;
            justify-content: center;
            align-items: center;
        }
        .image-modal.show { display: flex; }
        .image-modal img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; }
        .image-modal .close-btn {
            position: absolute;
            top: 20px; right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Hero 图片 + 标题 -->
    <div style="text-align:center; margin-bottom:40px;">
        <div style="max-width:500px; margin:0 auto; position:relative; border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.5);">
            <img src="/static/hero-image.jpg" alt="千人千面" style="width:100%; height:auto; display:block;">
            <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(26,35,50,0.2) 0%, rgba(26,35,50,0.75) 100%);"></div>
        </div>
        <div class="title-container">
            <h1 class="chinese-title">千人千面发型迁移系统</h1>
            <p class="english-subtitle">AI-Powered Hairstyle Transfer System</p>
        </div>
    </div>

    <!-- 步骤指示器 -->
    <div class="workflow">
        <div class="step active" id="step1"><div class="step-number">1</div><div>上传发型参考图</div></div>
        <div class="step" id="step2"><div class="step-number">2</div><div>提取发型</div></div>
        <div class="step" id="step3"><div class="step-number">3</div><div>上传客户照片</div></div>
        <div class="step" id="step4"><div class="step-number">4</div><div>选择参数</div></div>
        <div class="step" id="step5"><div class="step-number">5</div><div>开始迁移</div></div>
        <div class="step" id="step6"><div class="step-number">6</div><div>查看结果</div></div>
    </div>

    <!-- 上传区域 -->
    <div class="upload-section">
        <!-- 发型参考图 -->
        <div class="upload-box" id="hairstyleBox" onclick="document.getElementById('hairstyleInput').click()">
            <h3>📸 步骤1: 发型参考图</h3>
            <p>点击上传发型参考图（完整人像）</p>
            <input type="file" id="hairstyleInput" accept="image/*" style="display:none" onchange="handleHairstyleUpload(event)">
            <img id="hairstylePreview" class="preview-image" style="display:none">
        </div>

        <!-- 客户照片 -->
        <div class="upload-box" id="customerBox" onclick="document.getElementById('customerInput').click()">
            <h3>👤 步骤3: 客户照片</h3>
            <p>点击上传客户照片</p>
            <input type="file" id="customerInput" accept="image/*" style="display:none" onchange="handleCustomerUpload(event)">
            <img id="customerPreview" class="preview-image" style="display:none">
        </div>
    </div>

    <!-- 步骤2：发型提取 -->
    <div style="background:#f9f9f9; border-radius:12px; padding:24px; margin-bottom:24px;">
        <h3 style="color:#1a1a1a; margin-bottom:16px;">✂️ 步骤2: 发型提取</h3>
        <p style="color:#555; font-size:14px; margin-bottom:16px;">上传发型参考图后，点击按钮提取发型轮廓（透明背景）</p>
        <div style="text-align:center;">
            <button class="btn" id="extractBtn" onclick="extractHair()" disabled style="background:linear-gradient(135deg,#2ecc71,#27ae60);box-shadow:0 10px 30px rgba(46,204,113,.3);">
                ✂️ 提取发型
            </button>
            <span id="extractStatus" style="font-size:14px; color:#888; margin-left:12px;"></span>
        </div>
        <div id="extractResult" style="display:none; margin-top:15px; padding:12px; background:#e8f5e9; border-radius:10px; text-align:center;">
            <p style="color:#2e7d32; font-size:13px; margin-bottom:8px; font-weight:600;">✅ 发型提取成功</p>
            <img id="hairExtractedPreview" src="" alt="提取的发型" style="max-width:100%; max-height:200px; border-radius:8px; cursor:zoom-in;" onclick="openModal(this.src)">
        </div>
    </div>

    <!-- 参数设置 -->
    <div class="params-section">
        <h3>⚙️ 步骤4: 参数设置</h3>

        <div class="option-group">
            <label>融合模式:</label>
            <select id="modelVersion">
                <option value="v1" selected>v1（推荐 — 脸型适配）</option>
                <option value="v2">v2（保持原脸型）</option>
            </select>
        </div>

        <div class="option-group">
            <label>脸型控制: <span id="faceShapeValue">50</span>%</label>
            <input type="range" id="faceShapeLevel" min="0" max="100" value="50"
                   oninput="document.getElementById('faceShapeValue').textContent=this.value">
            <div class="hint-text">0=最强瘦脸 · 100=保持原貌，拖动滑杆调节脸型融合程度</div>
        </div>

        <div class="option-group">
            <label>
                <input type="checkbox" id="enableSketch" style="margin-right:6px">
                启用素描风格转换
            </label>
        </div>

        <div class="option-group" id="sketchOptions" style="display:none">
            <label>素描风格:</label>
            <select id="sketchStyle">
                <option value="vivid" selected>🎨 彩绘素描（推荐1）</option>
                <option value="pencil">✏️ 铅笔素描（推荐2）</option>
                <option value="ink">🖌️ 水墨</option>
                <option value="anime">🎌 动漫风格</option>
            </select>
        </div>
    </div>

    <!-- 开始迁移按钮 -->
    <div class="controls">
        <button class="btn" id="transferBtn" onclick="startTransfer()" disabled>
            🚀 步骤5: 开始发型迁移
        </button>
    </div>

    <!-- 消息提示 -->
    <div class="message" id="message"></div>

    <!-- 加载遮罩 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingText">正在处理...</div>
        <div id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <p id="progressText">0%</p>
        </div>
    </div>

    <!-- 结果展示 -->
    <div class="result-section" id="resultSection">
        <h2>🎉 步骤6: 迁移完成！</h2>
        <div class="result-grid" id="resultGrid"></div>
        <div style="text-align:center; margin-top:24px">
            <button class="btn btn-dl" onclick="downloadResult()">⬇ 下载结果图</button>
            <button class="btn" onclick="resetAll()" style="background:linear-gradient(135deg,#636e72,#2d3436)">🔄 重新开始</button>
        </div>
    </div>

</div>

<!-- 图片放大模态框 -->
<div class="image-modal" id="imageModal" onclick="closeModal()">
    <span class="close-btn">&times;</span>
    <img id="modalImage" src="" alt="">
</div>

<script>
    let originalHairUrl  = null;   // 发型参考图本地路径
    let extractedHairUrl = null;   // 提取的发型图路径
    let customerFile     = null;   // 客户照片 File 对象
    let lastResultUrl    = null;   // 最后一次迁移结果 URL（用于下载）

    // ── 素描开关 ──
    document.getElementById('enableSketch').addEventListener('change', function() {
        document.getElementById('sketchOptions').style.display = this.checked ? 'block' : 'none';
    });

    // ── 步骤1：发型参考图上传 ──
    function handleHairstyleUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        // 本地预览
        const reader = new FileReader();
        reader.onload = e => {
            const preview = document.getElementById('hairstylePreview');
            preview.src = e.target.result;
            preview.style.display = 'block';
            document.getElementById('hairstyleBox').classList.add('has-image');
        };
        reader.readAsDataURL(file);

        // 重置提取状态
        originalHairUrl = null;
        extractedHairUrl = null;
        document.getElementById('extractBtn').disabled = false;
        document.getElementById('extractStatus').textContent = '';
        document.getElementById('extractResult').style.display = 'none';
        document.getElementById('transferBtn').disabled = true;

        window._hairstyleFile = file;
        updateStep(1);
    }

    // ── 步骤2：提取发型 ──
    async function extractHair() {
        if (!window._hairstyleFile) {
            showMessage('请先上传发型参考图', 'error');
            return;
        }

        showLoading('正在提取发型...');
        document.getElementById('extractBtn').disabled = true;
        document.getElementById('extractStatus').textContent = '提取中...';

        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            if (progress <= 90) updateProgress(progress);
        }, 400);

        try {
            const fd = new FormData();
            fd.append('hairstyle_image', window._hairstyleFile);

            const r = await fetch('/api/extract-hair', { method: 'POST', body: fd });
            const d = await r.json();

            clearInterval(interval);
            updateProgress(100);

            if (d.success) {
                originalHairUrl  = d.original_url;
                extractedHairUrl = d.extracted_url;

                document.getElementById('hairExtractedPreview').src = d.extracted_url;
                document.getElementById('extractResult').style.display = 'block';
                document.getElementById('extractStatus').textContent = '✅ 提取成功';
                showMessage('发型提取成功！', 'success');
                updateStep(2);
                checkReady();
            } else {
                document.getElementById('extractStatus').textContent = '❌ 提取失败';
                document.getElementById('extractBtn').disabled = false;
                showMessage('发型提取失败: ' + (d.message || '未知错误'), 'error');
            }
        } catch (e) {
            clearInterval(interval);
            document.getElementById('extractStatus').textContent = '❌ 提取失败';
            document.getElementById('extractBtn').disabled = false;
            showMessage('发型提取失败: ' + e.message, 'error');
        } finally {
            clearInterval(interval);
            hideLoading();
        }
    }

    // ── 步骤3：客户照片上传 ──
    function handleCustomerUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        customerFile = file;
        const reader = new FileReader();
        reader.onload = e => {
            const preview = document.getElementById('customerPreview');
            preview.src = e.target.result;
            preview.style.display = 'block';
            document.getElementById('customerBox').classList.add('has-image');
        };
        reader.readAsDataURL(file);
        updateStep(3);
        checkReady();
    }

    // ── 检查是否可以开始迁移 ──
    function checkReady() {
        const ready = originalHairUrl && extractedHairUrl && customerFile;
        document.getElementById('transferBtn').disabled = !ready;
        if (ready) updateStep(4);
    }

    // ── 步骤5：开始发型迁移 ──
    async function startTransfer() {
        if (!originalHairUrl || !customerFile) {
            showMessage('请先完成发型提取并上传客户照片', 'error');
            return;
        }

        const enableSketch = document.getElementById('enableSketch').checked;
        showLoading(enableSketch ? '正在处理（素描转换约需 30-60 秒）...' : '正在进行发型迁移...');
        updateStep(5);
        document.getElementById('transferBtn').disabled = true;

        // 模拟进度条
        let progress = 0;
        const interval = setInterval(() => {
            progress += enableSketch ? 1.5 : 3;
            if (progress <= 90) updateProgress(progress);
        }, 1000);

        try {
            const fd = new FormData();
            fd.append('customer_image', customerFile);
            fd.append('original_hair_url', originalHairUrl);
            fd.append('model_version', document.getElementById('modelVersion').value);
            fd.append('face_shape_level', document.getElementById('faceShapeLevel').value);
            fd.append('enable_sketch', enableSketch);
            fd.append('sketch_style', document.getElementById('sketchStyle').value);

            const r = await fetch('/api/transfer', { method: 'POST', body: fd });
            const d = await r.json();

            clearInterval(interval);
            updateProgress(100);

            if (d.success) {
                showResult(d);
                showMessage('发型迁移成功！🎉', 'success');
                updateStep(6);
            } else {
                showMessage('迁移失败: ' + (d.error || '未知错误'), 'error');
            }
        } catch (e) {
            clearInterval(interval);
            showMessage('迁移失败: ' + e.message, 'error');
        } finally {
            clearInterval(interval);
            hideLoading();
            document.getElementById('transferBtn').disabled = false;
        }
    }

    // ── 展示结果 ──
    function showResult(data) {
        const grid = document.getElementById('resultGrid');
        grid.innerHTML = '';
        lastResultUrl = data.result_url;

        // 融合结果图
        grid.innerHTML += `
            <div class="result-item">
                <p>发型迁移结果</p>
                <img src="${data.result_url}" onclick="openModal(this.src)" alt="迁移结果">
                <p style="color:#888;font-size:12px;margin-top:6px">耗时 ${data.info.elapsed_time} · 模型 ${data.info.model_version} · 脸型控制 ${data.info.face_shape_level}%</p>
            </div>`;

        // 素描图（如果有）
        if (data.sketch_url) {
            window.currentSketchUrl = data.sketch_url;
            grid.innerHTML += `
                <div class="result-item">
                    <p>素描效果（${data.info.sketch_style || ''}）</p>
                    <img src="${data.sketch_url}" onclick="openModal(this.src)" alt="素描效果">
                    <div style="margin-top:10px">
                        <button class="btn btn-dl" onclick="downloadSketch()" style="padding:8px 18px;font-size:13px">⬇ 下载素描图</button>
                    </div>
                </div>`;
        } else if (document.getElementById('enableSketch').checked) {
            grid.innerHTML += `<div class="result-item"><p style="color:#e74c3c">素描转换未生成，请检查 DASHSCOPE_API_KEY 配置</p></div>`;
        }

        document.getElementById('resultSection').classList.add('show');
    }

    // ── 工具函数 ──
    function updateStep(n) {
        for (let i = 1; i <= 6; i++) {
            document.getElementById('step' + i).classList.toggle('active', i <= n);
        }
    }

    function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = 'message show ' + type;
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 5000);
    }

    function showLoading(text) {
        document.getElementById('loadingText').textContent = text;
        document.getElementById('loading').classList.add('show');
        updateProgress(0);
    }

    function hideLoading() {
        document.getElementById('loading').classList.remove('show');
        updateProgress(0);
    }

    function updateProgress(pct) {
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = Math.round(pct) + '%';
    }

    function downloadResult() {
        if (!lastResultUrl) return;
        const a = document.createElement('a');
        a.href = lastResultUrl;
        a.download = 'hairstyle_result_' + Date.now() + '.png';
        a.click();
    }

    function downloadSketch() {
        if (!window.currentSketchUrl) { showMessage('没有素描图片可下载', 'error'); return; }
        const a = document.createElement('a');
        a.href = window.currentSketchUrl;
        a.download = 'hairstyle_sketch_' + Date.now() + '.png';
        a.click();
    }

    function resetAll() { location.reload(); }

    function openModal(src) {
        document.getElementById('modalImage').src = src;
        document.getElementById('imageModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('imageModal').classList.remove('show');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
